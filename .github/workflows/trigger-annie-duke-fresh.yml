name: Dispatch Annie Duke fresh build

on:
  push:
    branches:
      - claude/annie-duke-remote-brain-YnOMP
    paths:
      - .github/workflows/trigger-annie-duke-fresh.yml

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch build-brain.yml (fresh full build, no resume)
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_PAT }}
        run: |
          set -eo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::WORKFLOW_DISPATCH_PAT secret is not set on this repo."
            exit 1
          fi
          gh workflow run build-brain.yml \
            --repo robgabel/brainsfor \
            --ref main \
            -f person="Annie Duke" \
            -f confirm_cost=yes-23 \
            -f resume=false
          echo "Dispatched build-brain.yml for Annie Duke (fresh full build, ~\$23, ~60-90 min)."
