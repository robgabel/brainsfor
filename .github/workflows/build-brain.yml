name: Build brain pack

on:
  workflow_dispatch:
    inputs:
      person:
        description: Full name of the thinker (e.g. "Kara Swisher")
        required: true
        type: string
      slug:
        description: Optional brain slug override (default derived from name)
        required: false
        type: string
      target_atoms:
        description: Target atom count
        required: false
        default: "250"
        type: string
      max_sources:
        description: Max sources for phase 0 discovery
        required: false
        default: "15"
        type: string
      model:
        description: Override generation model
        required: false
        type: string
      synthesis_model:
        description: Override synthesis model
        required: false
        type: string
      resume:
        description: Resume from last completed phase
        required: false
        default: false
        type: boolean
      confirm_cost:
        description: Must equal "yes-23" to authorize the ~$23 spend
        required: true
        type: string

concurrency:
  group: brain-build-${{ inputs.slug || inputs.person }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Validate confirm_cost
        env:
          CONFIRM: ${{ inputs.confirm_cost }}
        run: |
          if [ "$CONFIRM" != "yes-23" ]; then
            echo "::error::confirm_cost must equal 'yes-23' to authorize the ~\$23 spend. Got: '$CONFIRM'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Derive slug
        id: slug
        env:
          PERSON: ${{ inputs.person }}
          SLUG_INPUT: ${{ inputs.slug }}
        run: |
          if [ -n "$SLUG_INPUT" ]; then
            SLUG="$SLUG_INPUT"
          else
            SLUG=$(python3 -c "
          import os, re
          s = os.environ['PERSON'].lower().strip()
          s = re.sub(r'[^\w\s-]', '', s)
          s = re.sub(r'[\s_]+', '-', s)
          print(s.strip('-'))
          ")
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Resolved slug: $SLUG"

      - name: Run auto-build-brain pipeline
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SLACK_BUILD_WEBHOOK: ${{ secrets.SLACK_BUILD_WEBHOOK }}
          IN_PERSON: ${{ inputs.person }}
          IN_SLUG: ${{ inputs.slug }}
          IN_TARGET_ATOMS: ${{ inputs.target_atoms }}
          IN_MAX_SOURCES: ${{ inputs.max_sources }}
          IN_MODEL: ${{ inputs.model }}
          IN_SYNTHESIS_MODEL: ${{ inputs.synthesis_model }}
          IN_RESUME: ${{ inputs.resume }}
          OUT_SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          set -eo pipefail
          ARGS=(--person "$IN_PERSON")
          if [ -n "$IN_SLUG" ]; then ARGS+=(--slug "$IN_SLUG"); fi
          if [ -n "$IN_TARGET_ATOMS" ]; then ARGS+=(--target-atoms "$IN_TARGET_ATOMS"); fi
          if [ -n "$IN_MAX_SOURCES" ]; then ARGS+=(--max-sources "$IN_MAX_SOURCES"); fi
          if [ -n "$IN_MODEL" ]; then ARGS+=(--model "$IN_MODEL"); fi
          if [ -n "$IN_SYNTHESIS_MODEL" ]; then ARGS+=(--synthesis-model "$IN_SYNTHESIS_MODEL"); fi
          if [ "$IN_RESUME" = "true" ]; then ARGS+=(--resume); fi
          echo "Running: python3 scripts/auto-build-brain.py ${ARGS[*]}"
          python3 scripts/auto-build-brain.py "${ARGS[@]}" 2>&1 | tee "brains/${OUT_SLUG}-build.log"

      - name: Upload build log and progress (any outcome)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-${{ steps.slug.outputs.slug }}-${{ github.run_id }}
          path: |
            brains/${{ steps.slug.outputs.slug }}/build-progress.json
            brains/${{ steps.slug.outputs.slug }}-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Commit progress + pack to brain branch (any outcome)
        if: always() && steps.slug.outputs.slug != ''
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
          PERSON: ${{ inputs.person }}
          PIPELINE_OUTCOME: ${{ steps.run.outcome }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "brains/${SLUG}/" "brains/index.json" 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No tracked changes to commit (no progress or pack files changed)."
            exit 0
          fi

          if [ "$PIPELINE_OUTCOME" = "success" ]; then
            MSG="feat(brain): auto-build ${PERSON} (${SLUG}) — run ${GITHUB_RUN_ID}"
          else
            MSG="chore(brain): partial build progress for ${PERSON} (${SLUG}) — run ${GITHUB_RUN_ID} [${PIPELINE_OUTCOME}]"
          fi

          # Commit to a per-brain branch so progress accumulates across runs/resumes
          # without touching main. Concurrency group already prevents parallel runs
          # for the same slug, so no rebase/retry needed.
          BRANCH="brain/${SLUG}"
          git fetch origin "$BRANCH" 2>/dev/null || true
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/${BRANCH}"
            # Re-stage in case the checkout reset working tree
            git add "brains/${SLUG}/" "brains/index.json" 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "No new changes after syncing with remote branch."
              exit 0
            fi
          else
            git checkout -B "$BRANCH"
          fi

          git commit -m "$MSG"
          git push -u origin "$BRANCH"

          # Open a PR only on success. Skip if one already exists for this branch.
          if [ "$PIPELINE_OUTCOME" = "success" ]; then
            if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
              echo "PR already exists for ${BRANCH}; skipping create."
            else
              gh pr create \
                --base main \
                --head "$BRANCH" \
                --title "feat(brain): add ${PERSON} brain pack" \
                --body "$(cat <<EOF
          ## Summary
          - Auto-built brain pack for **${PERSON}** (\`${SLUG}\`) via \`build-brain.yml\` run [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})
          - Includes atoms, connections, synthesis, explore.html, and all 8 skill templates

          ## Review checklist
          - [ ] Audit score ≥ 70
          - [ ] explore.html renders all tabs
          - [ ] No \`{{\` template variables in pack/
          - [ ] brain-atoms.json has reasonable atom/connection counts

          Merging this PR triggers Vercel auto-deploy to brainsforfree.com.
          EOF
          )"
            fi
          fi
