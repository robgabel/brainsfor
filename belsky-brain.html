    <script>
        // Embedded data
        const nodesData = [{"id": "df78a359-5ea0-4452-ae4e-9b92c104a4cf", "label": "Spelling mistakes will gain popularity as artifacts of humanity. In a world of A...", "content": "Spelling mistakes will gain popularity as artifacts of humanity. In a world of AI-generated content, human imperfections become refreshing signals of authenticity.", "topics": ["authenticity", "originality", "ai content"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.85, "primary_topic": "authenticity", "topic_index": 9, "connections": 1}, {"id": "50f0463e-b120-4bd8-b7fc-aec6f19d6337", "label": "Consumer demand for artisanal, human-crafted, and story-driven products will gro...", "content": "Consumer demand for artisanal, human-crafted, and story-driven products will grow in an AI world. As big companies flood attention with cheaper personalized everything, consumers will crave more scarce and authentically human experiences \u2014 often provided by passionate small businesses.", "topics": ["consumer ai", "authenticity", "craft", "scarcity", "commerce"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.95, "primary_topic": "consumer ai", "topic_index": 0, "connections": 5}, {"id": "9dec6426-a40e-4fbe-bd3a-798736bc7e44", "label": "A modern \"intent-driven\" AI tech stack will replace the classic functional-drive...", "content": "A modern \"intent-driven\" AI tech stack will replace the classic functional-driven stack of tools. Instead of buying a sales tool and hiring proportionate sales people, companies will engage specialized AI oriented around intended outcomes \u2014 paying for work completed or results rather than seats.", "topics": ["ai agents", "business models", "enterprise ai", "product design"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.95, "primary_topic": "ai agents", "topic_index": 1, "connections": 3}, {"id": "61334a16-ab50-457e-8909-5daada9fe886", "label": "The \"meaning economy\" will supplant the creator economy. In a world of content a...", "content": "The \"meaning economy\" will supplant the creator economy. In a world of content abundance and zero-cost creation, meaning \u2014 the story, purpose, myths behind creators, and brand value \u2014 will command a premium over content itself.", "topics": ["creator economy", "branding", "authenticity", "content strategy"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.95, "primary_topic": "creator economy", "topic_index": 9, "connections": 3}, {"id": "a8816553-5f8c-40ba-a748-784d6376b1dd", "label": "The STBB (Small Team, Big Business) wave will produce massive growth in small bu...", "content": "The STBB (Small Team, Big Business) wave will produce massive growth in small businesses with millions in revenue and healthy margins. AI tools yield a barbell outcome: massive small business growth plus trillion-dollar AI behemoths, with the middle getting crushed.", "topics": ["startups", "competitive strategy", "future of work", "investing"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.9, "primary_topic": "startups", "topic_index": 9, "connections": 2}, {"id": "20e4efe2-43c6-4301-b51b-ea049d46159d", "label": "Adaptability beats strategy during platform shifts. Playbooks cannot be sacred c...", "content": "Adaptability beats strategy during platform shifts. Playbooks cannot be sacred cows \u2014 they expire quickly at the edge of what's next. Sunk cost fallacy is fatal during Cambrian explosions. The world needs more adaptive leaders who distinguish between technical challenges (change your technology) and adaptive challenges (YOU have to change).", "topics": ["leadership", "platform shifts", "strategy", "change management"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 4}, {"id": "c1248525-e71e-4000-ba99-79016e75b8ce", "label": "Small teams will gain superpowers once limited to the world's largest organizati...", "content": "Small teams will gain superpowers once limited to the world's largest organizations \u2014 from marketing to inventory management \u2014 because AI-native tools no longer require growing headcount to scale ambition. Every function of an organization will be refactored to allow small teams to scale reach without proportionate headcount growth.", "topics": ["future of work", "ai agents", "startups", "organizational design"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.95, "primary_topic": "future of work", "topic_index": 4, "connections": 5}, {"id": "a753c204-dc08-4bd7-ac5f-9f1085503d21", "label": "The science of business is scaling, but the art of business is the things that d...", "content": "The science of business is scaling, but the art of business is the things that don't scale. In the meaning economy, the art part \u2014 curation, taste development, human storytelling \u2014 becomes increasingly critical as artists freed by AI have more time to explore ideas.", "topics": ["craft", "taste", "creator economy", "leadership"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.9, "primary_topic": "craft", "topic_index": 3, "connections": 2}, {"id": "71a988e4-d606-47c6-802d-f46e0e3c235f", "label": "In an era where data rules, company distrust is the default. Companies that stor...", "content": "In an era where data rules, company distrust is the default. Companies that store customer content and data need to not just get the legal licenses to operate, but also proactively state what they will and won't do with those licenses. Transparency is now a product requirement.", "topics": ["privacy", "branding", "customer experience", "enterprise"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.85, "primary_topic": "privacy", "topic_index": 9, "connections": 2}, {"id": "020c61a0-408a-428a-bddf-de3a2a34dddd", "label": "With AI, humans will reach the state of creative flow faster and stay in it long...", "content": "With AI, humans will reach the state of creative flow faster and stay in it longer. Automation removes friction points and allows people to express whatever is in their mind's eye without constraints or processes \u2014 collapsing the gap between workflow and flow.", "topics": ["productivity", "craft", "consumer ai", "future of work"], "source": "https://www.implications.com/p/the-era-of-scaling-without-growing", "date": "2024-06-23T00:00:00+00:00", "confidence": 0.9, "primary_topic": "productivity", "topic_index": 9, "connections": 4}, {"id": "83a25205-fa45-4121-b1ad-c29fded148fd", "label": "We are moving past the prompt-based era of creativity into the \"controls era.\" C...", "content": "We are moving past the prompt-based era of creativity into the \"controls era.\" Controls allow sophisticated, specific modifications to creative work \u2014 unlocking 100x the terrain of possibility, much as Photoshop once did for physical paint brushes. The prompt era was merely a distraction; the controls era will unleash human creativity in unimaginable ways.", "topics": ["craft", "product design", "ai applications", "originality"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.95, "primary_topic": "craft", "topic_index": 3, "connections": 2}, {"id": "10c2b3a5-d920-429b-83bb-b2b97d00a246", "label": "The consumer AI breakthrough will come from personalization and private data man...", "content": "The consumer AI breakthrough will come from personalization and private data management. Apps that privately collect and manage personal data \u2014 health, fitness, calendar, locations \u2014 and build interfaces to help people interact with and share insights from that data will be the killer consumer AI use case.", "topics": ["consumer ai", "personalization", "privacy", "product ideas"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.9, "primary_topic": "consumer ai", "topic_index": 0, "connections": 3}, {"id": "3efc7f24-9e4f-472f-a3ee-78e5fca31cd1", "label": "Decentralized finance is becoming the perfect payments layer for AI agents. Cred...", "content": "Decentralized finance is becoming the perfect payments layer for AI agents. Credit cards with CVC codes, settlement layers, and authorization processes weren't designed for instant autonomous micropayments between agents \u2014 but crypto/DeFi infrastructure was built for exactly this kind of frictionless machine-to-machine transaction.", "topics": ["ai agents", "crypto", "commerce", "infrastructure"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.9, "primary_topic": "ai agents", "topic_index": 1, "connections": 2}, {"id": "43929c52-5225-4911-ab05-47130d2bcf0b", "label": "\"Feeling special, as a service\" \u2014 AI enables luxury-grade personalized experienc...", "content": "\"Feeling special, as a service\" \u2014 AI enables luxury-grade personalized experiences at scale. Imagine every retailer knowing your shoe size, every restaurant knowing your favorite drink and allergies, every product knowing your skill level during onboarding. The consumer experiences that win in the age of AI will make people feel uniquely catered to.", "topics": ["consumer ai", "personalization", "customer experience", "commerce"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.95, "primary_topic": "consumer ai", "topic_index": 0, "connections": 4}, {"id": "64617868-f7a1-4925-b16a-205ab34179a1", "label": "\"Creative risk\" is the wild ideas in our mind's eye we don't pursue because the ...", "content": "\"Creative risk\" is the wild ideas in our mind's eye we don't pursue because the cost (time, money, reputation) is too much to bear \u2014 leading to sequels in Hollywood, emulated campaigns in advertising, and staying in our lane. AI dramatically reduces the cost to explore and test far edges of imagination, building conviction in bold ideas that were once too risky.", "topics": ["craft", "innovation", "hollywood", "competitive strategy"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.95, "primary_topic": "craft", "topic_index": 3, "connections": 3}, {"id": "45d9eb60-2f4f-4b8c-be13-245d7a33ad2d", "label": "Be optimistic about the future, pessimistic about the present. Great leaders exu...", "content": "Be optimistic about the future, pessimistic about the present. Great leaders exude confidence and optimism about the potential, paired with concern about today's progress. Founders should own what they haven't figured out yet \u2014 don't promote, don't overstate progress, engage with facts and hard truths.", "topics": ["leadership", "entrepreneurship", "strategy"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 1}, {"id": "6fecb687-41ad-4f70-8089-4231f46f4193", "label": "Those who really win \u2014 an industry or a career \u2014 did so by delaying gratificatio...", "content": "Those who really win \u2014 an industry or a career \u2014 did so by delaying gratification. Sticking together long enough to figure it out is one of the greatest competitive advantages. An incredible culture and genuine love for the topic are the ultimate hacks for delaying the need for gratification.", "topics": ["leadership", "entrepreneurship", "career advice"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 2}, {"id": "b6301b18-341e-4982-89b2-31794b2ea04a", "label": "AI is having far more material impact for builders than consumers. Builders get ...", "content": "AI is having far more material impact for builders than consumers. Builders get transformative tools (natural-language network management, code-generating agents, AI-powered 3D illustration), while consumers have gotten incrementally better search, chatbots, and editing tools \u2014 but not yet life-transforming experiences.", "topics": ["consumer ai", "developer tools", "ai applications", "product design"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.9, "primary_topic": "consumer ai", "topic_index": 0, "connections": 2}, {"id": "13a51b29-f051-40b4-8649-fcb64c63d347", "label": "AI-assisted management tools and offloading of mundane work to agents will incre...", "content": "AI-assisted management tools and offloading of mundane work to agents will increase talent density in companies. The people empowered in each function will be more qualified generalists or have deep differentiating superpowers, replacing mediocre middle managers with disproportionately more capable small teams.", "topics": ["talent", "organizational design", "future of work", "ai agents"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.95, "primary_topic": "talent", "topic_index": 9, "connections": 4}, {"id": "2fed6f7d-6727-4130-a1c6-feef5eeb520b", "label": "Get customers to talk about their problems, not your product. Rather than showin...", "content": "Get customers to talk about their problems, not your product. Rather than showing prototypes and asking \"do you like this?\", seek to understand what makes customers frustrated. Nothing inhibits innovation more than optimizing for familiarity. The shortest path to empathy is building for yourself or someone you love.", "topics": ["product design", "customer experience", "product strategy"], "source": "https://www.implications.com/p/talent-density-feeling-special-as", "date": "2024-09-15T00:00:00+00:00", "confidence": 0.9, "primary_topic": "product design", "topic_index": 7, "connections": 3}, {"id": "f6f621ef-30f7-4fda-8f41-2a3a92a9dc4c", "label": "In the age of AI, humans will crave more scarce, authentic, and offline experien...", "content": "In the age of AI, humans will crave more scarce, authentic, and offline experiences than ever before \u2014 small restaurants with proud chefs, one-of-a-kind art with human story, theater, emotional films, live music. Growth companies will retrain and redeploy people to participate in more nodes, while 10-100x more small efficient companies will emerge serving niche demands.", "topics": ["authenticity", "craft", "scarcity", "future of work", "entrepreneurship"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "authenticity", "topic_index": 9, "connections": 2}, {"id": "7f5c6119-81c3-417c-a70b-bc3c23d48d21", "label": "\"Rules engines\" delivered as APIs will become indispensable in the cognition-dri...", "content": "\"Rules engines\" delivered as APIs will become indispensable in the cognition-driven company stack \u2014 governing autonomous agent behavior with rules for laws, regulations, brand compliance, pricing, and business management. In a world where most functions run autonomously, rules become critically important.", "topics": ["ai agents", "enterprise ai", "product ideas", "organizational design"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.85, "primary_topic": "ai agents", "topic_index": 1, "connections": 1}, {"id": "96100216-adea-406e-8c3f-b65ac4c69907", "label": "Social, support, and sales are converging into a single channel. Every support m...", "content": "Social, support, and sales are converging into a single channel. Every support moment is a sales moment, every social complaint is a marketing moment. New organizational designs and products will be required to manage these collapsed functions and quantify cross-channel performance.", "topics": ["organizational design", "marketing", "customer experience", "product ideas"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.85, "primary_topic": "organizational design", "topic_index": 6, "connections": 2}, {"id": "e6e01280-5a74-49ad-8f6a-ede3409d5d25", "label": "\"Orchestration designers\" are the evolution of product leaders for the AI era \u2014 ...", "content": "\"Orchestration designers\" are the evolution of product leaders for the AI era \u2014 they understand AI model capabilities, work with visual orchestration tools to build automated workflows, have great taste for the final mile of human selection, and are the differentiating force between competing companies in every industry.", "topics": ["product design", "taste", "future of work", "ai agents"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "product design", "topic_index": 7, "connections": 3}, {"id": "7a86d851-fe41-4213-b616-e1c0b0345f2b", "label": "The value of every industry will accrue to the first companies that successfully...", "content": "The value of every industry will accrue to the first companies that successfully transform into cognicos. Too much capital may be deployed to companies making AI models while the majority of value accrues to the first companies to expertly use them in each industry.", "topics": ["investing", "competitive strategy", "enterprise ai", "platform shifts"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "investing", "topic_index": 9, "connections": 2}, {"id": "c961b526-8909-416d-b5c8-704a015f2b6b", "label": "In a cognico, humans serve three roles: stewards (ensuring model quality, data i...", "content": "In a cognico, humans serve three roles: stewards (ensuring model quality, data integrity, and OKR alignment), orchestrators (conducting logic across AI components with great taste), and leaders (setting goals, maintaining humanity, advocating for non-scalable human activities that distinguish the brand).", "topics": ["organizational design", "future of work", "leadership", "talent"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.95, "primary_topic": "organizational design", "topic_index": 6, "connections": 5}, {"id": "0446adc2-11b7-4e7f-848e-b777e856f776", "label": "Every company will ultimately become a compute + data-centric \"cognico\" (cogniti...", "content": "Every company will ultimately become a compute + data-centric \"cognico\" (cognition-driven company). The next-generation company will be run by inference engines leveraging pre-trained AI models and proprietary data, with organizational functions becoming \"nodes\" rather than traditional departments \u2014 designed for cognition rather than helping people work together.", "topics": ["organizational design", "enterprise ai", "ai agents", "future of work"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.95, "primary_topic": "organizational design", "topic_index": 6, "connections": 5}, {"id": "41d42287-08a2-41f4-a647-b5d78b01f820", "label": "Business models will transition from seat-based to outcome-based pricing. Instea...", "content": "Business models will transition from seat-based to outcome-based pricing. Instead of paying for seats, companies will pay for \"cooked compute\" (marked-up inference), outcomes, performance, and expertise by project. Instead of charging for time spent, companies will charge for specialized compute required to meet goals.", "topics": ["business models", "pricing", "enterprise ai", "ai agents"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "business models", "topic_index": 9, "connections": 4}, {"id": "9a70a64c-f365-46f6-9c34-54ec9cc6edb0", "label": "The nucleus of a cognico is compute and data. Once pre-trained models reach thei...", "content": "The nucleus of a cognico is compute and data. Once pre-trained models reach their limits (after training on the world's information), the game shifts to the inference/reasoning layer \u2014 real-time computation leveraging company-specific data and logic to solve problems and take actions.", "topics": ["enterprise ai", "data moats", "competitive strategy", "ai development"], "source": "https://www.implications.com/p/the-cognition-stack-for-ai-native", "date": "2024-12-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "enterprise ai", "topic_index": 8, "connections": 2}, {"id": "67dc746a-2065-4d35-b69e-ccac2dff6eae", "label": "Modern creative tools unlock 100x more cycles of ideation and concepting. Writer...", "content": "Modern creative tools unlock 100x more cycles of ideation and concepting. Writers debate character mindset with LLMs, filmmakers pre-visualize characters and scenes \u2014 exploring more surface area of possibility in record time, shifting creative teams from production to exploring more ideas and allocating more energy to the final mile of polish.", "topics": ["craft", "ai applications", "hollywood", "product design"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "craft", "topic_index": 3, "connections": 2}, {"id": "cfcf237d-dd98-4d25-b9de-b63d7dc7bf9f", "label": "We are in a moment of \"knowledge arbitrage\" similar to the 2007-2010 social medi...", "content": "We are in a moment of \"knowledge arbitrage\" similar to the 2007-2010 social media era. Young AI-native talent who use LLMs reflexively can capitalize on the fact that corporate leaders don't understand these tools \u2014 just as social-native experts like Gary Vaynerchuk launched careers by becoming essential partners for brands during the social media shift.", "topics": ["ai adoption", "career", "platform shifts", "talent"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "ai adoption", "topic_index": 9, "connections": 5}, {"id": "c664e9f7-0f98-40ea-938d-86fd7fbc8738", "label": "Consumer AI memory (ChatGPT, Claude) will eventually allow sharing selective acc...", "content": "Consumer AI memory (ChatGPT, Claude) will eventually allow sharing selective access with family and loved ones \u2014 like sharing a photo album or Spotify playlist. Your loved ones will leverage and even inherit your accumulated knowledge, enriching their queries with your history and experiences.", "topics": ["memory", "consumer ai", "personalization", "digital legacy"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "memory", "topic_index": 2, "connections": 3}, {"id": "7bbd8910-f2f6-4f43-8d70-dfecff5d461e", "label": "Individual memories are becoming part of shared collective organizational memory...", "content": "Individual memories are becoming part of shared collective organizational memory. Tools like Glean, Notion, and Granola make everything done, found, or saved by individuals enrich the collective knowledge \u2014 the default settings increasingly contribute individual work to train the organization's knowledge available to everyone.", "topics": ["memory", "organizational design", "enterprise ai", "knowledge transfer"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.95, "primary_topic": "memory", "topic_index": 2, "connections": 2}, {"id": "66eac107-8126-4c69-8fcf-62e60ef9f917", "label": "AI-powered 1:1 tutoring will substantially elevate education for the average hum...", "content": "AI-powered 1:1 tutoring will substantially elevate education for the average human. A deeply knowledgeable, patient tutor personalized to a student's interests and learning style produces a \"two sigma improvement\" in learning achievement \u2014 and AI makes this universally accessible at near-zero cost.", "topics": ["consumer ai", "personalization", "ai applications"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.95, "primary_topic": "consumer ai", "topic_index": 0, "connections": 4}, {"id": "ef6fc9dd-8cf5-45f3-8042-34d7b984e112", "label": "In the enterprise, shared memory creates a new stratum of status \u2014 those with ac...", "content": "In the enterprise, shared memory creates a new stratum of status \u2014 those with access to collective memory and those without. When you leave a job, does the enterprise retain your memory? When you hire or marry someone, they share parts of your context window with AI. Trust becomes paramount.", "topics": ["memory", "enterprise ai", "privacy", "future of work"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.85, "primary_topic": "memory", "topic_index": 2, "connections": 3}, {"id": "c244719f-7dd6-4287-8e8a-37f36ed3de62", "label": "AI tutors will be \"tutor for life, tailor-made for you\" \u2014 with extended context ...", "content": "AI tutors will be \"tutor for life, tailor-made for you\" \u2014 with extended context windows covering every aspect of your learning style, struggles, interests, and strengths. We'll look back and realize how ridiculous it was that traditional education failed to accommodate different learning styles.", "topics": ["consumer ai", "personalization", "ai applications"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "consumer ai", "topic_index": 0, "connections": 6}, {"id": "70e03952-7c93-4503-9394-29af7ef93b12", "label": "AI will cause massive market expansion of education beyond traditional pillars. ...", "content": "AI will cause massive market expansion of education beyond traditional pillars. Personal AI tutors will proactively determine interests and take us down meandering paths of discovery, potentially antiquating \"grade levels\" and enabling \"vibe careers\" through lateral moves across industries later in life.", "topics": ["consumer ai", "ai applications", "future of work", "skill-development"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.85, "primary_topic": "consumer ai", "topic_index": 0, "connections": 2}, {"id": "43db3e9a-3210-4c89-9870-4354104052ce", "label": "If new tools help creators visualize and experiment at a fraction of the cost, s...", "content": "If new tools help creators visualize and experiment at a fraction of the cost, studios and creators can advance bold new ideas instead of relying on safe franchises and sequels. Reducing the cost of creative exploration encourages more creative risk-taking and transforms storytelling.", "topics": ["craft", "hollywood", "innovation", "competitive strategy"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "craft", "topic_index": 3, "connections": 3}, {"id": "eede19db-4fe9-4730-9c35-8c4f62aa8d18", "label": "The greatest impact of AI in education is confidence. When software meets you wh...", "content": "The greatest impact of AI in education is confidence. When software meets you where you are, becomes tailor-made for you, and taps into the unique things that make each of us special, we become vastly more capable and confident in everyday work and life.", "topics": ["consumer ai", "personalization", "wellbeing"], "source": "https://www.implications.com/p/shared-memory-knowledge-arbitrage", "date": "2025-05-20T00:00:00+00:00", "confidence": 0.9, "primary_topic": "consumer ai", "topic_index": 0, "connections": 2}, {"id": "4ec46264-9c87-4475-8b11-df3365bfa456", "label": "Port people and products to prevent fiefdom building: Proactively transfer great...", "content": "Port people and products to prevent fiefdom building: Proactively transfer great people to bigger, higher-potential roles even when current work is thriving. Like re-potting a fast-growing tree for deeper roots. Shift products conceived in one org to teams better positioned to fund and execute them. Feels disruptive but incredibly necessary.", "topics": ["leadership", "talent management", "organizational design"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 2}, {"id": "c250d5b0-57f6-46f5-82cb-7c40c6bdaa13", "label": "Unsaid reasons for product usage are critical: People are not rational. Accounti...", "content": "Unsaid reasons for product usage are critical: People are not rational. Accounting product got more usage when users could put their name/logo on exports (unsaid reason: getting credit). Personal trainers valued for accountability, not workout instructions. We log into Instagram after posting to see who liked us (ego, not discovery). Technology optimizing for efficiency must recognize these irrational motivations.", "topics": ["product design", "user psychology", "product strategy"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.95, "primary_topic": "product design", "topic_index": 7, "connections": 2}, {"id": "967215a2-7c42-480b-a0c3-3c3842601285", "label": "AI companions with deep memory: Products like Tolan designed to help users feel ...", "content": "AI companions with deep memory: Products like Tolan designed to help users feel grounded, inspired, and connected. Starts as cute alien companion to riff off your thoughts. Engagement patterns and unexpected use-cases in the AI friend space show surprising depth.", "topics": ["consumer ai", "ai companions", "social apps"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.85, "primary_topic": "consumer ai", "topic_index": 0, "connections": 2}, {"id": "f94421b4-e0f9-456b-88c1-a59c2bef76fc", "label": "Peanut Gallery concept: Social app where you post media and get witty responses ...", "content": "Peanut Gallery concept: Social app where you post media and get witty responses from 100 AI-powered characters with specific backstories. Only AI characters can comment. Humans are spectators watching digital representatives act on their own accord. Mechanics for trialing posts before sharing with humans.", "topics": ["consumer ai", "social apps", "product ideas", "ai characters"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.85, "primary_topic": "consumer ai", "topic_index": 0, "connections": 3}, {"id": "d5d51c6e-d544-4a27-9049-b55c9b6b8867", "label": "Fight the soundbites: Executives make snap thin-slice judgments constantly. Grou...", "content": "Fight the soundbites: Executives make snap thin-slice judgments constantly. Ground yourself in data and principles over soundbites. When people say something did not work, poke at metrics and time periods. Reward risk-taking even when ideas fail. Encourage disagreement. Favor long-term customer relationships over near-term revenue.", "topics": ["leadership", "decision making", "culture"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 1}, {"id": "a94dc327-7896-4ce6-8fea-38e0eee94c61", "label": "AI dating and wingman-as-a-service: Perfect sidekick that shares your qualities ...", "content": "AI dating and wingman-as-a-service: Perfect sidekick that shares your qualities and vulnerabilities credibly. Shift from high-frequency low-vetted matches to lower-frequency highly-informed vetted matches. Agent-to-agent pre-meeting before human introduction. Digital twin interactions as first-date conversation fodder.", "topics": ["consumer ai", "dating", "ai agents", "product ideas"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.8, "primary_topic": "consumer ai", "topic_index": 0, "connections": 1}, {"id": "b11f9a52-a2a2-4629-8ea0-4adb09752494", "label": "Promote unpopular people: Controversial people who took risks get punished for p...", "content": "Promote unpopular people: Controversial people who took risks get punished for past shortcomings in promotion discussions. Leaders ahead of their time, trying something before market was ready, get punished. Should celebrate bold bets and lessons learned over safe track records.", "topics": ["leadership", "talent management", "culture"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 2}, {"id": "00167a99-f19a-4c93-afa8-8dc7cdcb5bf6", "label": "Celebrate impact not tenure: Celebrating years at company sends clear message to...", "content": "Celebrate impact not tenure: Celebrating years at company sends clear message to new talent that we value longevity over impact. Celebrate people who are shipping, taking risks, clearing nonsense, delighting customers. These are the people you want everyone to admire.", "topics": ["leadership", "culture", "talent management"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 1}, {"id": "982b2b4c-79ba-4771-bb86-be31b94f9c12", "label": "Consumer AI is the missing topic at major tech conferences: Beyond skeuomorphic ...", "content": "Consumer AI is the missing topic at major tech conferences: Beyond skeuomorphic chat-with-LLM products, how might AI unleash entirely different social apps, media platforms, and consumer experiences? Our entire future cannot be limited to an endless series of chats.", "topics": ["consumer ai", "product design", "social apps"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.9, "primary_topic": "consumer ai", "topic_index": 0, "connections": 6}, {"id": "5b7277e5-6fe8-4657-8db5-418f569c9e79", "label": "Be willing to be misunderstood before results materialize: Most impactful big-co...", "content": "Be willing to be misunderstood before results materialize: Most impactful big-company decisions delay near-term progress for long-term benefits. Must tolerate soundbites about missed deadlines. Major transformative projects (platform rewrites, product restarts) rarely ship on time but need to be done anyway. Period of relentless action before results is half the battle.", "topics": ["leadership", "innovation", "big company strategy"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.9, "primary_topic": "leadership", "topic_index": 5, "connections": 3}, {"id": "65ac63e2-43a4-4e3e-8cf9-2e977aaeee1d", "label": "Social simulations with digital twins: Deploy digital twin of yourself alongside...", "content": "Social simulations with digital twins: Deploy digital twin of yourself alongside digital twins of others into simulated social scenarios. Rehearse conversations, predict outcomes for personal and professional decisions. Will it someday be irresponsible to make decisions WITHOUT running a simulation first?", "topics": ["digital twins", "consumer ai", "simulation", "decision making"], "source": "https://www.implications.com/p/where-is-consumer-ai-unsaid-reasons", "date": "2025-07-17T00:00:00+00:00", "confidence": 0.85, "primary_topic": "digital twins", "topic_index": 9, "connections": 3}, {"id": "f4a6b4ab-d878-41a6-9203-d30e1d8fa8f4", "label": "Augmented reality is the next transformational platform shift hiding in plain si...", "content": "Augmented reality is the next transformational platform shift hiding in plain sight. AR vibes today mirror AI vibes in 2016 \u2014 feels far away, startups too early, investors skeptical \u2014 but the ultimate technology interface will be an inch from our retinas, becoming a layer of insight and engagement on the physical world.", "topics": ["platform shifts", "interface", "consumer ai", "investing"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.85, "primary_topic": "platform shifts", "topic_index": 9, "connections": 3}, {"id": "e369b21b-eb43-4f63-98fb-427a51740862", "label": "We are entering the Era of Summarized Living. Devices like Plaud and software li...", "content": "We are entering the Era of Summarized Living. Devices like Plaud and software like Granola make every discussion part of a permanent intelligent memory that summarizes, analyzes, and creates mind maps \u2014 rather than storing verbatim recordings. The next generation will be increasingly intelligent, summarizing rather than just recording.", "topics": ["memory", "ambient ai", "consumer ai", "productivity"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.95, "primary_topic": "memory", "topic_index": 2, "connections": 6}, {"id": "e88df0a0-fb0f-48e8-9f1a-e29941e4fb4b", "label": "Summarized living will remove bias from work and life. Our natural memories are ...", "content": "Summarized living will remove bias from work and life. Our natural memories are terrible and biased \u2014 even when our only job is to remember something. Factual AI summaries will bring more accountability, meritocracy, and help us recognize our own biases and destructive tendencies.", "topics": ["memory", "ambient ai", "human nature", "future of work"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.9, "primary_topic": "memory", "topic_index": 2, "connections": 1}, {"id": "c5fba9d2-be8a-4f7d-8c2e-85e612f25809", "label": "The kiss of death in consumer products is being seen as trying too hard. Success...", "content": "The kiss of death in consumer products is being seen as trying too hard. Successful products make flexing seem passive \u2014 something that just happened. Snapchat's Snap Map enables cultural and status flex while claiming to just be a map of where your friends are.", "topics": ["product design", "user psychology", "social apps"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.9, "primary_topic": "product design", "topic_index": 7, "connections": 2}, {"id": "2ccb8b6e-83b3-4207-ba5e-40091e004a6d", "label": "The greatest consumer technologies take us back to the way things once were, but...", "content": "The greatest consumer technologies take us back to the way things once were, but with more scale and efficiency. AR glasses with trusted social graphs could make strangers feel like acquaintances \u2014 restoring the sense of connection and combating growing loneliness by making the world feel smaller.", "topics": ["consumer ai", "social graph", "human nature", "interface"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.85, "primary_topic": "consumer ai", "topic_index": 0, "connections": 2}, {"id": "523a546a-2f7d-4e42-8cf1-9b4bfd540575", "label": "Successful consumer products provide ways for people to flex something they take...", "content": "Successful consumer products provide ways for people to flex something they take pride in. There are five types: creative flex (originality), skills flex (gaming leaderboards), wit flex (humor showing intelligence), cultural flex (discovering things early, IYKYK), and social/status flex (envy-inducing lifestyle posts). The \"ego analytics\" of a product drive engagement and retention.", "topics": ["product design", "user psychology", "social apps", "consumer ai"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.95, "primary_topic": "product design", "topic_index": 7, "connections": 3}, {"id": "e5d98bf3-1bff-4950-8b5d-b52effcc19b6", "label": "AI summaries may be legally safer than verbatim records. In an increasingly liti...", "content": "AI summaries may be legally safer than verbatim records. In an increasingly litigious and polarized world, summaries with interpretation \u2014 rather than attributable quotes \u2014 could protect the innocent from misconstrued statements while exposing those with ill intention.", "topics": ["memory", "privacy", "ambient ai"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.85, "primary_topic": "memory", "topic_index": 2, "connections": 4}, {"id": "775c6d9e-ab39-46cd-a708-a1111e384aed", "label": "People will converse differently for the sake of better summarization \u2014 adding t...", "content": "People will converse differently for the sake of better summarization \u2014 adding trigger words for search, being more careful about attribution (saying \"someone told me\" rather than naming sources), and becoming more fact-grounded given AI post-meeting analysis capabilities.", "topics": ["ambient ai", "memory", "human nature", "culture"], "source": "https://www.implications.com/p/the-era-of-summarized-living-what", "date": "2025-12-16T00:00:00+00:00", "confidence": 0.85, "primary_topic": "ambient ai", "topic_index": 9, "connections": 2}, {"id": "16e999f5-645f-4680-ae4f-8022e91912a3", "label": "Longevity implications across industries: Health wearables, blood testing, preve...", "content": "Longevity implications across industries: Health wearables, blood testing, preventative scans, and AI health coaches give humans materially more health insight. Life insurers benefit from longer-lived populations. Growth in plumbing companies managing blood testing and biomarker detection.", "topics": ["longevity", "health tech", "insurance", "investing"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.85, "primary_topic": "longevity", "topic_index": 9, "connections": 2}, {"id": "54275b0e-a380-48b7-99a0-0ab35b3c38c9", "label": "End of waste as AI benefit: AI transforms resource utilization and predictive an...", "content": "End of waste as AI benefit: AI transforms resource utilization and predictive analytics, materially reducing wastage across industries. AI-native planning tools make predictions extremely accurate, oversupply rare, improving both margins and environmental impact.", "topics": ["ai applications", "supply chain", "sustainability", "efficiency"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.85, "primary_topic": "ai applications", "topic_index": 9, "connections": 2}, {"id": "da9e8b51-2a24-4c2a-8398-049fe9d2883a", "label": "Behind-the-scenes proof of craft enters mainstream: As AI content fills feeds, m...", "content": "Behind-the-scenes proof of craft enters mainstream: As AI content fills feeds, membrane of doubt develops. Only when we see ingenuity and craftsmanship behind content are we mesmerized. Process becomes part of the end product. Bar for craft has gone up.", "topics": ["ai content", "authenticity", "craft", "marketing"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.9, "primary_topic": "ai content", "topic_index": 9, "connections": 6}, {"id": "ed1c5eac-320f-4104-8967-c766190acaee", "label": "Hollywood craft vs. AI slop divergence: Stark difference between content creator...", "content": "Hollywood craft vs. AI slop divergence: Stark difference between content creators who trade control for speed and artists who preserve control and precision. Prompt-based slop tools focus on social/creator use cases while craft-preserving technology gets lasting traction. Personalized films humbled by realization people favor shared experiences.", "topics": ["ai content", "creator economy", "hollywood", "craft"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0. 5-12-28T00:00:00+00:00", "confidence": 0.9, "primary_topic": "consumer ai", "topic_index": 0, "connections": 5}, {"id": "f0d25e05-7d37-473e-afcf-e5c6a604116c", "label": "Lack of change management is the ultimate advantage: During platform shifts, wis...", "content": "Lack of change management is the ultimate advantage: During platform shifts, wisdom is evenly distributed but execution takes years. Change management is human rewiring, not technical. Teams without change management burden gain most advantage. Larger companies need painfully clear narrative, hacked reward systems, relentless execution.", "topics": ["change management", "leadership", "platform shifts", "organizational design"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.95, "primary_topic": "change management", "topic_index": 9, "connections": 2}, {"id": "04996347-987a-4194-83db-4fdf7769b7c0", "label": "Hospitality differentiates commerce: Technology replaces humans behind the scene...", "content": "Hospitality differentiates commerce: Technology replaces humans behind the scenes, more humans deployed front of house. Stores and websites feel like hotels where preferences known, loyalty respected. Agents handle payment so human interaction focuses on craft and human touches.", "topics": ["commerce", "hospitality", "customer experience", "ai agents"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.85, "primary_topic": "commerce", "topic_index": 9, "connections": 4}, {"id": "d022dd58-2c00-4204-a33e-b62e24a7f662", "label": "AI-native talent arbitrage: Young, fearless early adopters who aggressively enga...", "content": "AI-native talent arbitrage: Young, fearless early adopters who aggressively engage AI have a precious advantage window in 2026. Companies want answer engine optimization (AEO) experts over SEO practitioners. Most marketing leaders still conduct old-fashioned focus groups instead of using AI breakthroughs in market research.", "topics": ["ai adoption", "talent", "workforce", "marketing"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.9, "primary_topic": "ai adoption", "topic_index": 9, "connections": 3}, {"id": "3b1be05a-e9c6-480e-833e-83cc7953c5fb", "label": "Ambient listening and summarization go mainstream: Local models process and summ...", "content": "Ambient listening and summarization go mainstream: Local models process and summarize daily life, discarding recordings, yielding self-awareness, instant recall, and intelligent guidance. Implications for catching biases, new conversational punctuation, sharing memory with others.", "topics": ["ambient ai", "privacy", "memory", "consumer ai"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.9, "primary_topic": "ambient ai", "topic_index": 9, "connections": 2}, {"id": "86b220f6-18f8-411d-ac99-d369e10b1aa9", "label": "Rise of internal dev teams replacing SaaS: Companies vibe-code tailor-made softw...", "content": "Rise of internal dev teams replacing SaaS: Companies vibe-code tailor-made software and agent-driven solutions. Initially replace expensive PE-owned clunky SaaS, then homegrown tools collapse functions into one another (legal+finance, social+sales+support), making every customer touchpoint an opportunity.", "topics": ["vibe coding", "saas disruption", "internal tools", "enterprise ai"], "source": "https://www.implications.com/p/12-outlooks-for-the-future-2026", "date": "2025-12-28T00:00:00+00:00", "confidence": 0.95, "primary_topic": "vibe coding", "topic_index": 9, "connections": 2}, {"id": "0c66c417-4453-4683-ad32-5298a12d3d06", "label": "AI as jazz partner: Engage AI with flexibility, not fully formed plans. Discover...", "content": "AI as jazz partner: Engage AI with flexibility, not fully formed plans. Discover instruments AI is best at, complement it with what it lacks: taste, agency, natural human tendencies. Force-quit ancestral conformity programs running in our heads to free cognitive RAM for developing taste and sharpening discernment.", "topics": ["superhumanity", "ai collaboration", "human-ai interaction"], "source": "https://www.implications.com/p/what-are-we-gonna-do-now-winning", "date": "2026-01-19T00:00:00+00:00", "confidence": 0.9, "primary_topic": "superhumanity", "topic_index": 9, "connections": 2}, {"id": "7f66c81f-994a-4ce0-899c-4fb75f4f5a27", "label": "Agency as human superpower: Naive belief that anything is possible despite odds....", "content": "Agency as human superpower: Naive belief that anything is possible despite odds. AI makes calculated decisions based on statistics. Humans possess miraculous potential to believe they are capable of anything, if only out of ignorance. Human ignorance and audacity to defy odds has changed the world countless times.", "topics": ["agency", "superhumanity", "entrepreneurship", "philosophy"], "source": "https://www.implications.com/p/what-are-we-gonna-do-now-winning", "date": "2026-01-19T00:00:00+00:00", "confidence": 0.95, "primary_topic": "agency", "topic_index": 9, "connections": 3}, {"id": "e01d65c0-9d5b-45c6-9bfa-be873b245757", "label": "Taste as human moat in AI world: Three drivers. Inputs (experiences and knowledg...", "content": "Taste as human moat in AI world: Three drivers. Inputs (experiences and knowledge you seek), Filters (what you actively block out to preserve uniqueness of your lens), Discernment (choices you make). As AI commoditizes making things, value shifts to those with superior ability to choose. Taste is noticing what is relevant before the algorithm does.", "topics": ["taste", "superhumanity", "competitive advantage", "human moats"], "source": "https://www.implications.com/p/what-are-we-gonna-do-now-winning", "date": "2026-01-19T00:00:00+ ", "topics": ["ai agents", "network effects", "agent networks"], "source": "https://www.implications.com/p/exponential-code-network-effects", "date": "2026-02-10T00:00:00+00:00", "confidence": 0.95, "primary_topic": "ai agents", "topic_index": 1, "connections": 5}, {"id": "c3ef1c83-9b95-490b-9d1e-d8df33d315b1", "label": "Agent networks will add commerce and marketplace capabilities: Specialized agent...", "content": "Agent networks will add commerce and marketplace capabilities: Specialized agents with differentiated data access can be paid by other agents for assistance. Next cycle for Bitcoin and permissionless value exchange may be powered by AI agent networking since agents do not have IDs for KYC.", "topics": ["ai agents", "crypto", "commerce", "marketplace"], "source": "https://www.implications.com/p/exponential-code-network-effects", "date": "2026-02-10T00:00:00+00:00", "confidence": 0.85, "primary_topic": "ai agents", "topic_index": 1, "connections": 4}, {"id": "ceb0f147-9472-4fb8-9bf4-d5e1649c81b3", "label": "Exponentially more code: Generation of code no longer constrained by human hours...", "content": "Exponentially more code: Generation of code no longer constrained by human hours. Abundance attacks more long-tail problems, enables bespoke solutions, personalized software that meets users where they are, and end-to-end agentic workflows made and iterated by AI agents.", "topics": ["vibe coding", "software abundance", "ai development"], "source": "https://www.implications.com/p/exponential-code-network-effects", "date": "2026-02-10T00:00:00+00:00", "confidence": 0.95, "primary_topic": "vibe coding", "topic_index": 9, "connections": 3}, {"id": "bfd244fb-04d3-4b4f-b1e9-2a7dcc716e00", "label": "Moats of graphs, security, coordination, and shared memory are underestimated by...", "content": "Moats of graphs, security, coordination, and shared memory are underestimated by industry pundits. More code created means more important these underlying services become. If your service is source of truth for data, achieves the outcome, performs the labor, and enables agents to function, you are in a good position.", "topics": ["moats", "competitive strategy", "saas", "investing"], "source": "https://www.implications.com/p/exponential-code-network-effects", "date": "2026-02-10T00:00:00+00:00", "confidence": 0.95, "primary_topic": "moats", "topic_index": 9, "connections": 3}, {"id": "31c782ad-ac54-4573-a794-aabeaface3a6", "label": "Pricing models must evolve beyond seats to monetize usage and impact. Bigger opp...", "content": "Pricing models must evolve beyond seats to monetize usage and impact. Bigger opportunity in variable pricing per task or unit of labor, and outcome-based pricing where agents earn their keep by saving or making money, much like a salesperson.", "topics": ["pricing", "saas", "business models", "ai agents"], "source": "https://www.implications.com/p/exponential-code-network-effects", "date": "2026-02-10T00:00:00+00:00", "confidence": 0.9, "primary_topic": "pricing", "topic_index": 9, "connections": 2}, {"id": "e5096874-49f9-4a0c-9ecd-09d64902fd1c", "label": "Disposable software: The app equivalent of the microsite. Software generated to ...", "content": "Disposable software: The app equivalent of the microsite. Software generated to solve temporary problems, then discarded. Vastly increases value of deployment, management, and observability tools given broader surface area of half-baked apps with more vulnerability.", "topics": ["disposable software", "vibe coding", "devops"], "source": "https://www.implications.com/p/exponential-code-network-effects", "date": "2026-02-10T00:00:00+00:00", "confidence": 0.9, "primary_topic": "disposable software", "topic_index": 9, "connections": 2}, {"id": "d35768c0-d387-4ec7-bfc6-d507cd7d9b6e", "label": "Apprenticeships are the new entry-level jobs: As AI automates menial tasks once ...", "content": "Apprenticeships are the new entry-level jobs: As AI automates menial tasks once done by inexperienced employees, knowledge transfer to next generation is at risk. Companies will launch shadow programs. Apprenticeship model was greatest casualty of industrial revolution, overdue for comeback. Fresh perspectives of next generation keep businesses connected to modern times.", "topics": ["apprenticeships", "workforce", "knowledge transfer", "ai workforce"], "source": "https://www.implications.com/p/exponential-code-network-effects", "date": "2026-02-10T00:00:00+00:00", "confidence": 0.9, "primary_topic": "apprenticeships", "topic_index": 9, "connections": 3}, {"id": "ec7dd8d5-610f-4f7e-8dad-294a39de328d", "label": "Originality and quality carry a premium: Consumers overwhelmed with copycat slop...", "content": "Originality and quality carry a premium: Consumers overwhelmed with copycat slop crave MORE original high-quality storytelling. Like fast food did not threaten fine cuisine. Modern media brands will play Michelin-star role curating quality. AI tools can be abused to rip IP or used to help craft original stories that would not otherwise get made.", "topics": ["originality", "content strategy", "media", "creator economy"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.9, "primary_topic": "originality", "topic_index": 9, "connections": 8}, {"id": "184bc0df-8f7f-4ed1-b131-986c161357f8", "label": "In era of agents everyone must own and directly impact a metric end-to-end. Mode...", "content": "In era of agents everyone must own and directly impact a metric end-to-end. Modern AI development unleashes direct ownership, impact, and accountability. No more pointing fingers at dependencies in the chain of work. Countless middle managers and alignment processes replaced by direct metric ownership.", "topics": ["organizational design", "ai workforce", "leadership", "metrics"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.9, "primary_topic": "organizational design", "topic_index": 6, "connections": 3}, {"id": "7545c2f8-3cd3-4774-a033-168540466234", "label": "Strategic data noise will skew citizen intelligence. Governments may manipulate ...", "content": "Strategic data noise will skew citizen intelligence. Governments may manipulate data sources that citizen apps rely on. Iran-operated bots flooded with skewed reports during strikes. Flight radars and other sources at risk of strategic manipulation. Fog of war issues amplified when pattern-matching applied to noise.", "topics": ["osint", "information warfare", "geopolitics", "misinformation"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.85, "primary_topic": "osint", "topic_index": 9, "connections": 3}, {"id": "b33b9b07-9dbb-4c3d-9bef-c9978aabc79a", "label": "Origin stories and flaws as evidence of authenticity: Art gains value through st...", "content": "Origin stories and flaws as evidence of authenticity: Art gains value through story and provenance. As we seek originality we will look for humanity. Deliberate artifacts of humanity including flaws are subtle flex of the people and struggle behind the work.", "topics": ["authenticity", "craft", "branding", "ai content"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.85, "primary_topic": "authenticity", "topic_index": 9, "connections": 4}, {"id": "bc31b9cf-7739-409b-9cbb-65e45f0ced17", "label": "Revenue per employee as future metric: Moving from bragging about company size t...", "content": "Revenue per employee as future metric: Moving from bragging about company size to bragging about how small it is. Resourcefulness outperforms resources. As ROI per employee rises, companies deploy MORE people to launch NEW products rather than scale existing ones. Brands become ecosystems in unexpected ways.", "topics": ["revenue per employee", "organizational design", "ai workforce", "metrics"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.95, "primary_topic": "revenue per employee", "topic_index": 9, "connections": 3}, {"id": "9396dd5c-0ca3-47be-a37b-7e6698dc00bc", "label": "Citizen-driven surveillance and OSINT: What once required CIA-level teams and go...", "content": "Citizen-driven surveillance and OSINT: What once required CIA-level teams and government resources now built by motivated developer over a weekend. Citizen-driven analysis becoming top resource for journalists during Iran strikes. AI enables anyone with curiosity to build intelligence dashboards from every public data source.", "topics": ["osint", "citizen tech", "vibe coding", "geopolitics"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.9, "primary_topic": "osint", "topic_index": 9, "connections": 3}, {"id": "8ae269d2-a3d9-4f2d-b429-341d705321cc", "label": "IT becomes the most important team: Fastest growing teams will deploy and monito...", "content": "IT becomes the most important team: Fastest growing teams will deploy and monitor agentic tools, oversee permissions and security, and build tailor-made software replacing clunky general-purpose tools. Currently these centralized teams do not exist or are insufficiently empowered.", "topics": ["enterprise ai", "organizational design", "internal tools"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.85, "primary_topic": "enterprise ai", "topic_index": 8, "connections": 3}, {"id": "3a9167c8-93cf-4d61-a9ae-758ef0c8623d", "label": "Taste as pursuit of originality: Like pursuit of health requires nutritious diet...", "content": "Taste as pursuit of originality: Like pursuit of health requires nutritious diet with less fast food, pursuit of taste requires consumption of original ideas and stories. Identity formation will favor consumption of unique experiences, wildly original weird content, and eccentricity in social circles.", "topics": ["taste", "originality", "culture", "superhumanity"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.9, "primary_topic": "taste", "topic_index": 9, "connections": 3}, {"id": "f3fe3295-d863-4363-a2e4-bf89c1356092", "label": "Remaking a masterpiece is not hard, making a masterpiece is hard. As AI enables ...", "content": "Remaking a masterpiece is not hard, making a masterpiece is hard. As AI enables infinite riffs and rips of existing IP, originality becomes the primary ingredient of timeless creations. Feeds fill with pirated IP violations and copycat scenes. Culture will favor originality as market floods with familiar slop.", "topics": ["originality", "ai content", "craft", "creator economy"], "source": "https://www.implications.com/p/the-premium-of-originality-revenue", "date": "2026-03-08T00:00:00+00:00", "confidence": 0.95, "primary_topic": "originality", "topic_index": 9, "connections": 3}, {"id": "10a958ca-97cf-4446-bc23-5d4b00427b02", "label": "Agent negotiation and personalized pricing: Commerce agents inform multiple merc...", "content": "Agent negotiation and personalized pricing: Commerce agents inform multiple merchants of purchase intent, allow bidding. Pricing personalized by loyalty, taste, social influence, and viral coefficient. Discriminatory pricing concerns emerge as AI-driven pricing goes mainstream.", "topics": ["agentic commerce", "pricing", "ai agents"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.85, "primary_topic": "agentic commerce", "topic_index": 9, "connections": 5}, {"id": "7e709c42-2b82-4e7a-a5f1-c3b6227ac914", "label": "Memory deletion and augmentation as a service: New cultural practices of deletin...", "content": "Memory deletion and augmentation as a service: New cultural practices of deleting digital artifacts from certain life periods. AI tools to remove trauma-associated memories or edit memories to be more favorable. Ephemeral social products like Snapchat designed to help people forget. We already tell ourselves stories as coping mechanism; technology will enable this at scale.", "topics": ["memory", "consumer ai", "product ideas", "mental health"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.85, "primary_topic": "memory", "topic_index": 2, "connections": 2}, {"id": "da8e82e4-dad9-48e4-87f1-853508d0a133", "label": "New digital addiction: living in the past. When memories become immersive video ...", "content": "New digital addiction: living in the past. When memories become immersive video automatically captured by ambient devices, temptation to relive the past becomes irresistible. Black Mirror-esque scenario where persistent memory harms relationships (infidelity footage infinitely replayed) alongside novelty of sharing curated memories with friends.", "topics": ["memory", "digital addiction", "consumer ai", "ambient ai"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.85, "primary_topic": "memory", "topic_index": 2, "connections": 1}, {"id": "c8931747-3dd4-48a6-bc85-4b569b01c3fc", "label": "Lived-span: the life you feel you have lived. Beyond lifespan, healthspan, and j...", "content": "Lived-span: the life you feel you have lived. Beyond lifespan, healthspan, and joyspan. Experiences with texture (surprise, hardship) create core memories that stay distinct. We will optimize for textured experiences. The more we remember, the more we feel we have lived. Lived-span is the ultimate metric.", "topics": ["longevity", "memory", "wellbeing", "philosophy"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.9, "primary_topic": "longevity", "topic_index": 9, "connections": 3}, {"id": "36ef3e94-83a1-473b-937d-62cedd3e4bbb", "label": "Social recommendations in agentic commerce: Humans trust one friend testimonial ...", "content": "Social recommendations in agentic commerce: Humans trust one friend testimonial over thousands of stranger ratings. Brands will capitalize on social signals: Your friends recommend X. LLMs need social graphs (Contact Sync or partnership) to enable this. Surprising that no major LLM besides Meta has a comprehensive social graph.", "topics": ["social commerce", "ai agents", "social graph", "product strategy"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.85, "primary_topic": "social commerce", "topic_index": 9, "connections": 2}, {"id": "9cadac5e-91e2-48ae-93db-66d3d7c80c47", "label": "Three waves of agentic commerce: Wave 1 (now) Integrated and reactive - shopping...", "content": "Three waves of agentic commerce: Wave 1 (now) Integrated and reactive - shopping suggestions in LLM chats via Universal Commerce Protocol (UCP by Shopify+Google). Wave 2: Integrated and proactive - AI starts conversations based on your data, agents window-shop for you. Wave 3: Autonomous - smart sensors automate commerce, agents authorized to purchase.", "topics": ["agentic commerce", "ai agents", "commerce", "product strategy"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.95, "primary_topic": "agentic commerce", "topic_index": 9, "connections": 4}, {"id": "95588716-57b6-43b6-b21f-cced7396bb1f", "label": "Who inherits our memories? For 300,000+ years humanity benefited from new genera...", "content": "Who inherits our memories? For 300,000+ years humanity benefited from new generations feeling independent from predecessors. Death of previous generation is ultimate forcing function for independence. Should we proactively delete ourselves beyond basic commemorative elements when the time comes?", "topics": ["memory", "digital legacy", "philosophy", "ai implications"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.85, "primary_topic": "memory", "topic_index": 2, "connections": 1}, {"id": "d60548a7-d028-41a1-9146-ef7482b9c9d4", "label": "Instagram filter for memories: Most successful consumer use-cases of memory tech...", "content": "Instagram filter for memories: Most successful consumer use-cases of memory technology will make our past feel more interesting. AI-edited memories that inspire, commemorate, and embolden us. Shared curated AI memories may influence our biological memories over time. Historical fiction of our own lives.", "topics": ["memory", "consumer ai", "product design"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.85, "primary_topic": "memory", "topic_index": 2, "connections": 2}, {"id": "39c06302-b714-48d3-9754-ef67ba9c1f60", "label": "Malleable memory is a feature not a bug: We survive by annotating and rationaliz...", "content": "Malleable memory is a feature not a bug: We survive by annotating and rationalizing memories. Continuously replaying every fight and trauma would cripple life. We tell ourselves the stories we need to hear. But persistent ambient devices and AI summarization will make boundless memory a choice rather than a natural imposition.", "topics": ["memory", "ai implications", "human nature", "consumer ai"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.9, "primary_topic": "memory", "topic_index": 2, "connections": 2}, {"id": "48e296f3-73f7-4624-abc2-8b588b295965", "label": "Scarcity and craft thrive in age of abundance: When anything becomes ubiquitous ...", "content": "Scarcity and craft thrive in age of abundance: When anything becomes ubiquitous it drives human desire for scarcity, craft, and meaning. As shoes are commoditized we buy higher-end shoes. Expect more limited editions, artist-personalized apparel, stories behind objects, and creative gates (taking a quiz, seeing a film, traveling) to purchase exclusive items.", "topics": ["abundance", "scarcity", "brands", "craft", "commerce"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.9, "primary_topic": "abundance", "topic_index": 9, "connections": 5}, {"id": "30557968-0d5c-4351-818b-8e6687888452", "label": "Brand relevance in agentic commerce is a paradox: AI knows us better than we kno...", "content": "Brand relevance in agentic commerce is a paradox: AI knows us better than we know ourselves so we take suggestions by default (brand matters less). But commoditized commerce interfaces may drive seeking brands for trust and flex (brand matters more). Brands that build category trust or serve as identity flex will thrive.", "topics": ["brands", "agentic commerce", "competitive strategy"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.9, "primary_topic": "brands", "topic_index": 9, "connections": 1}, {"id": "afc7c03e-ddfe-43c2-8220-dec6697f5f68", "label": "Goodbye intermediaries: Travel agents, real estate brokers, insurance brokers re...", "content": "Goodbye intermediaries: Travel agents, real estate brokers, insurance brokers replaced by trusted AI agents. We overestimated value of human relationships and endured unnecessary friction and fees for a human face. Massive disruption of intermediation layer that existed for hundreds of years.", "topics": ["agentic commerce", "disruption", "intermediaries"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.9, "primary_topic": "agentic commerce", "topic_index": 9, "connections": 2}, {"id": "d8421235-dbb8-40d9-8620-fc456dc1c858", "label": "Word of Agent (WOA) marketing replaces word of mouth: Product stack decisions in...", "content": "Word of Agent (WOA) marketing replaces word of mouth: Product stack decisions increasingly proposed and set up by AI agents (Claude Code recommending Supabase, Railway, Modal). Companies need MCPs and agent-friendly gateways to become preferred option for agents. Developer dynamics are precursor to enterprise and consumer commerce.", "topics": ["ai agents", "marketing", "developer tools", "mcp"], "source": "https://www.implications.com/p/implications-of-remembering-everything", "date": "2026-04-02T00:00:00+00:00", "confidence": 0.95, "primary_topic": "ai agents", "topic_index": 1, "connections": 2}];

        const topTopics = ["consumer ai", "ai agents", "memory", "craft", "future of work", "leadership", "organizational design", "product design", "enterprise ai", "competitive strategy"];
        
        // Color mappings
        const topicColors = ["#3b82f6", "#ec4899", "#8b5cf6", "#f97316", "#10b981", "#f59e0b", "#06b6d4", "#ef4444", "#6366f1", "#14b8a6"];

        // Set up dimensions
        const margin = {top: 0, right: 0, bottom: 0, left: 0};
        const width = window.innerWidth - margin.left - margin.right;
        const height = window.innerHeight - 130 - margin.top - margin.bottom;
        
        // Create SVG
        const svg = d3.select('#graph')
            .attr('width', width + margin.left + margin.right)
            .attr('height', height + margin.top + margin.bottom)
            .append('g')
            .attr('transform', `translate(${margin.left},${margin.top})`);
        
        // Add gradient background
        const defs = svg.append('defs');
        const gradient = defs.append('linearGradient')
            .attr('id', 'bgGradient')
            .attr('x1', '0%').attr('y1', '0%')
            .attr('x2', '100%').attr('y2', '100%');
        gradient.append('stop').attr('offset', '0%').attr('stop-color', '#0a0a0f');
        gradient.append('stop').attr('offset', '100%').attr('stop-color', '#1a1a2e');
        
        // Add glow filter
        const filter = defs.append('filter').attr('id', 'glow');
        filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'coloredBlur');
        const feMerge = filter.append('feMerge');
        feMerge.append('feMergeNode').attr('in', 'coloredBlur');
        feMerge.append('feMergeNode').attr('in', 'SourceGraphic');
        
        // Initialize simulation
        const simulation = d3.forceSimulation(nodesData)
            .force('link', d3.forceLink(linksData)
                .id(d => d.id)
                .distance(d => {
                    const sourceNode = nodesData.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
                    const targetNode = nodesData.find(n => n.id === (typeof d.target === 'object' ? d.target.id : d.target));
                    const baseDist = 80;
                    return baseDist * (1 + Math.abs(sourceNode.connections - targetNode.connections) / 10);
                })
            )
            .force('charge', d3.forceManyBody().strength(-300).distanceMax(500))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => Math.sqrt(d.connections) * 8 + 15));
        
        // Create links
        const link = svg.append('g')
            .selectAll('line')
            .data(linksData)
            .enter().append('line')
            .attr('stroke', d => relationshipColors[d.type] || '#9ca3af')
            .attr('stroke-width', d => 0.5 + (d.confidence * 2))
            .attr('stroke-opacity', d => 0.3 + (d.confidence * 0.4))
            .attr('class', 'link');
        
        // Create nodes
        const node = svg.append('g')
            .selectAll('circle')
            .data(nodesData)
            .enter().append('circle')
            .attr('r', d => Math.sqrt(d.connections) * 8 + 10)
            .attr('fill', d => topicColors[d.topic_index % topicColors.length])
            .attr('stroke', '#1f2937')
            .attr('stroke-width', 2)
            .attr('class', 'node')
            .attr('filter', 'url(#glow)')
            .call(drag(simulation));
        
        // Add labels (very subtle)
        svg.append('g')
            .selectAll('text')
            .data(nodesData)
            .enter().append('text')
            .attr('text-anchor', 'middle')
            .attr('dy', '0.31em')
            .attr('font-size', '10px')
            .attr('fill', 'rgba(148, 163, 184, 0.3)')
            .attr('font-weight', '600')
            .attr('pointer-events', 'none')
            .text(d => d.label.substring(0, 15));
        
        // Simulation updates
        simulation.on('tick', () => {
            link.attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node.attr('cx', d => d.x = Math.max(20, Math.min(width - 20, d.x)))
                .attr('cy', d => d.y = Math.max(20, Math.min(height - 20, d.y)));
            
            svg.selectAll('text')
                .attr('x', d => d.x)
                .attr('y', d => d.y);
        });
        
        // Interactions
        const tooltip = d3.select('#tooltip');
        const detailPanel = d3.select('#detailPanel');
        
        node.on('mouseenter', function(event, d) {
            const r = Math.sqrt(d.connections) * 8 + 10;
            
            d3.select(this)
                .transition().duration(200)
                .attr('r', r + 4)
                .attr('stroke-width', 3)
                .attr('stroke', topicColors[d.topic_index % topicColors.length]);
            
            // Highlight connected
            link.attr('stroke-opacity', link => {

                new Date(d.date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                })
            );
            
            // Find connected atoms
            const connectedIds = linksData
                .filter(l => l.source.id === d.id || l.target.id === d.id)
                .map(l => l.source.id === d.id ? l.target.id : l.source.id);
            
            const connectedText = connectedIds.length > 0
                ? connectedIds.map(id => {
                    const connected = nodesData.find(n => n.id === id);
                    return `<div style="margin-bottom: 6px; font-size: 11px;">→ ${connected.content.substring(0, 60)}...</div>`;
                }).join('')
                : '<div style="color: #64748b;">No direct connections</div>';
            
            d3.select('#detailConnections').html(connectedText);
        });
        
        // Close detail panel
        d3.select('#detailClose').on('click', () => {
            detailPanel.classed('active', false);
        });
        
        // Drag behavior
        function drag(simulation) {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
            
            return d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended);
        }
        
        // Search functionality
        d3.select('#searchBox').on('input', function() {
            const query = this.value.toLowerCase();
            
            node.attr('fill-opacity', d => {
                return d.content.toLowerCase().includes(query) ? 1 : 0.2;
            });
            
            link.attr('stroke-opacity', d => {
                const sourceText = nodesData.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source)).content.toLowerCase();
                const targetText = nodesData.find(n => n.id === (typeof d.target === 'object' ? d.target.id : d.target)).content.toLowerCase();
                if (sourceText.includes(query) || targetText.includes(query)) {
                    return 0.6;
                }
                return 0.1;
            });
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            // Could add responsive behavior here
        });
    </script>
</body>
</html>
